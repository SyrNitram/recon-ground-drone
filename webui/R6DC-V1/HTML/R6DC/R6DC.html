	<br>
	<button id="10" class="CTRL" style="height:200px;width:200px">Toggle LED</button> <!-- button for pin 13 -->
	
	<script type="text/javascript">
		$(document).ready(function(){$(".CTRL").click(function(){var p = $(this).attr('id'); $.get("http://192.168.1.164:80/", {cmd:p});});});
		$(document).keypress(function(event){var keycode = (event.keyCode ? event.keyCode : event.which);$.get("http://192.168.1.164:80/", {cmd:(keycode - 48 + 10)});});
	</script>
